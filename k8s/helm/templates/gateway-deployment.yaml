apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "titan-os.fullname" . }}-gateway
  labels:
    {{- include "titan-os.labels" . | nindent 4 }}
    component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "titan-os.selectorLabels" . | nindent 6 }}
      component: gateway
  template:
    metadata:
      labels:
        {{- include "titan-os.selectorLabels" . | nindent 8 }}
        component: gateway
    spec:
      serviceAccountName: {{ include "titan-os.serviceAccountName" . }}
      containers:
      - name: gateway
        image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
        imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: metrics
          containerPort: 8001
          protocol: TCP
        env:
        - name: PORT
          value: "8000"
        - name: LOG_LEVEL
          value: {{ .Values.gateway.logLevel }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "titan-os.fullname" . }}-gateway
  labels:
    {{- include "titan-os.labels" . | nindent 4 }}
    component: gateway
spec:
  type: LoadBalancer
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  - port: 8001
    targetPort: metrics
    protocol: TCP
    name: metrics
  selector:
    {{- include "titan-os.selectorLabels" . | nindent 4 }}
    component: gateway
