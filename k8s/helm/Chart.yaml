apiVersion: v2
name: titan-os
description: A complete orchestration platform for AI agents and workflows
type: application
version: 1.0.0
appVersion: 1.0.0

keywords:
  - orchestration
  - agents
  - workflows
  - distributed

home: https://github.com/ChaitanyaJoshi1769/TitanOS
sources:
  - https://github.com/ChaitanyaJoshi1769/TitanOS
maintainers:
  - name: Chaitanya Joshi
    email: chaitanyajoshi15@gmail.com

dependencies:
  - name: postgresql
    version: "13.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  - name: redis
    version: "18.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  - name: kafka
    version: "27.0.0"
    repository: https://charts.bitnami.com/bitnami
    condition: kafka.enabled

  - name: prometheus
    version: "25.0.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled

  - name: grafana
    version: "7.0.0"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
