apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Jaeger
    type: jaeger
    url: http://jaeger:16686
    access: proxy
    editable: true

  - name: OpenSearch
    type: elasticsearch
    url: http://opensearch:9200
    access: proxy
    database: ""
    editable: true
    jsonData:
      esVersion: 7.10.0
      logMessageField: ""
      logLevelField: ""
      timeField: "@timestamp"
